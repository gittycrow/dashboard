<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --surface:#0e1219; --surface2:#141820; --surface3:#1a1f2a;
  --border:#1e2535; --border2:#252d3d;
  --gold:#c8a96e; --gold2:#e8c98a; --blue:#5b9cf6; --green:#4ade9a;
  --red:#f87171; --purple:#a78bfa; --text:#ddd8ce; --text2:#9ca3af; --text3:#5a6374;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 100% 60% at 20% 0%,rgba(200,169,110,0.06) 0%,transparent 60%),
             radial-gradient(ellipse 80% 50% at 80% 100%,rgba(91,156,246,0.05) 0%,transparent 60%);
  pointer-events:none;}
body::after{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;}
.wrap{position:relative;z-index:1;}

/* TICKER */
.ticker{background:linear-gradient(90deg,var(--surface2),#111827);border-bottom:1px solid var(--border2);
  overflow:hidden;display:flex;align-items:stretch;height:38px;position:sticky;top:0;z-index:100;}
.tlabel{background:var(--gold);color:var(--bg);font-size:0.65rem;font-weight:700;letter-spacing:0.14em;
  text-transform:uppercase;padding:0 16px;display:flex;align-items:center;flex-shrink:0;white-space:nowrap;}
.tcatbtn{background:var(--surface3);border:none;border-right:1px solid var(--border2);color:var(--text3);
  font-size:0.67rem;font-family:'Outfit',sans-serif;padding:0 12px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.tcatbtn.on{color:var(--gold);background:rgba(200,169,110,0.08);}
.tcatbtn:hover{color:var(--text);}
.ttrack{flex:1;overflow:hidden;display:flex;align-items:center;}
.tinner{display:flex;white-space:nowrap;animation:tick 70s linear infinite;}
.tinner:hover{animation-play-state:paused;}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.titem{display:inline-flex;align-items:center;padding:0 26px;font-size:0.77rem;color:var(--text2);
  cursor:pointer;transition:color 0.2s;border-right:1px solid var(--border);}
.titem:hover{color:var(--gold2);}
.titem::before{content:'◆';color:var(--gold);margin-right:9px;font-size:0.42rem;}

/* HEADER */
.hdr{padding:24px 32px 16px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);}
.greeting{font-family:'Cormorant Garamond',serif;font-size:2.7rem;font-weight:300;line-height:1;}
.greeting em{font-style:italic;color:var(--gold);}
.daterow{display:flex;align-items:center;gap:14px;margin-top:8px;}
.dstr{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;}
.clk{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--gold);}
.hdiv{width:1px;height:11px;background:var(--border2);}
.open-outlook-btn{display:flex;align-items:center;gap:9px;background:var(--surface2);
  border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:10px;
  cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:500;
  transition:all 0.25s;text-decoration:none;}
.open-outlook-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(91,156,246,0.07);}

/* GRID */
.grid{padding:16px 32px 32px;display:grid;grid-template-columns:270px 1fr 320px;grid-template-rows:auto auto;gap:14px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:border-color 0.3s;}
.card:hover{border-color:var(--border2);}
.shine{position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(200,169,110,0.2) 40%,rgba(91,156,246,0.12) 70%,transparent 100%);}
.clabel{display:flex;align-items:center;gap:7px;font-size:0.62rem;font-weight:600;text-transform:uppercase;
  letter-spacing:0.14em;color:var(--text3);margin-bottom:14px;}
.clabelrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.clabelrow .clabel{margin-bottom:0;}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0;}
.rbtn{background:none;border:1px solid var(--border2);color:var(--text3);border-radius:7px;
  padding:3px 9px;font-size:0.7rem;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;}
.rbtn:hover{color:var(--blue);border-color:var(--blue);}

/* WEATHER */
.w-hero{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
.w-icon{font-size:3rem;line-height:1;filter:drop-shadow(0 0 10px rgba(200,169,110,0.25));}
.w-temp{font-family:'Cormorant Garamond',serif;font-size:3.6rem;font-weight:300;line-height:1;}
.w-temp sup{font-size:1.3rem;color:var(--text3);vertical-align:top;margin-top:7px;}
.w-city{font-size:0.72rem;color:var(--gold);font-weight:600;letter-spacing:0.08em;margin-top:4px;}
.w-desc{font-size:0.8rem;color:var(--text2);margin-top:2px;}
.w-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.w-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;}
.w-val{font-size:0.95rem;font-weight:500;}
.w-key{font-size:0.65rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;}
.uv-wrap{margin-top:12px;}
.uv-top{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;display:flex;justify-content:space-between;}
.uv-bar{height:5px;border-radius:3px;background:linear-gradient(90deg,#4ade80,#facc15,#f97316,#ef4444);position:relative;}
.uv-pin{position:absolute;top:-4px;width:3px;height:13px;background:white;border-radius:2px;transform:translateX(-50%);box-shadow:0 0 6px rgba(255,255,255,0.5);}

/* CALENDAR IFRAME */
.cal-card{grid-column:2;grid-row:1/3;}
.cal-frame-wrap{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--border2);height:520px;}
.cal-frame-wrap iframe{width:100%;height:100%;border:none;display:block;filter:invert(0.88) hue-rotate(180deg) saturate(0.85) brightness(0.95);}
.cal-overlay-btn{position:absolute;top:8px;right:8px;background:rgba(14,18,25,0.9);border:1px solid var(--border2);
  color:var(--blue);padding:5px 12px;border-radius:8px;font-size:0.72rem;cursor:pointer;
  font-family:'Outfit',sans-serif;transition:all 0.2s;text-decoration:none;backdrop-filter:blur(8px);}
.cal-overlay-btn:hover{background:rgba(91,156,246,0.15);border-color:var(--blue);}

/* TASKS */
.tasks-card{grid-column:3;grid-row:1;}
.task-input-row{display:flex;gap:8px;margin-bottom:12px;}
.task-input{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:7px 12px;font-family:'Outfit',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.2s;}
.task-input:focus{border-color:var(--green);}
.task-input::placeholder{color:var(--text3);}
.add-btn{background:rgba(74,222,154,0.1);border:1px solid rgba(74,222,154,0.3);color:var(--green);
  border-radius:8px;padding:7px 12px;cursor:pointer;font-size:0.82rem;font-family:'Outfit',sans-serif;
  font-weight:600;transition:all 0.2s;white-space:nowrap;}
.add-btn:hover{background:rgba(74,222,154,0.2);}
.task-list{max-height:260px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.titem-row{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}
.titem-row:last-child{border-bottom:none;}
.tcb{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.tcb:hover{border-color:var(--green);}
.tcb.done{background:var(--green);border-color:var(--green);}
.tcb.done::after{content:'✓';font-size:10px;color:var(--bg);font-weight:700;}
.ttitle{font-size:0.83rem;color:var(--text);line-height:1.4;flex:1;}
.ttitle.strike{text-decoration:line-through;color:var(--text3);}
.tdel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.9rem;padding:0 4px;transition:color 0.2s;flex-shrink:0;}
.tdel:hover{color:var(--red);}
.empty-tasks{color:var(--text3);font-size:0.82rem;text-align:center;padding:20px 0;}

/* AI */
.ai-card{grid-column:3;grid-row:2;}
.ai-body{display:flex;flex-direction:column;gap:10px;}
.ai-sec{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;}
.ai-sec-title{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.13em;color:var(--gold);margin-bottom:8px;}
.ai-text{font-size:0.81rem;color:var(--text2);line-height:1.6;}
.focus-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.focus-pill{background:rgba(91,156,246,0.1);border:1px solid rgba(91,156,246,0.2);color:var(--blue);border-radius:20px;padding:3px 10px;font-size:0.73rem;}

/* NEWS (bottom left) */
.news-card{grid-column:1;grid-row:2;}
.ntabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.ntab{padding:3px 9px;border-radius:20px;font-size:0.66rem;cursor:pointer;border:1px solid var(--border2);
  background:transparent;color:var(--text3);font-family:'Outfit',sans-serif;transition:all 0.2s;font-weight:500;}
.ntab.on{background:var(--gold);color:var(--bg);border-color:var(--gold);}
.ntab:hover:not(.on){color:var(--text);}
.nscroll{max-height:260px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.nitem{padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.15s;}
.nitem:last-child{border-bottom:none;}
.nitem:hover .nhead{color:var(--gold2);}
.nhead{font-size:0.81rem;font-weight:500;line-height:1.4;color:var(--text);transition:color 0.15s;}
.nmeta{font-size:0.67rem;color:var(--text3);margin-top:3px;display:flex;gap:7px;}
.nsrc{color:var(--blue);}

/* LOADER */
.loader{display:flex;gap:5px;align-items:center;padding:20px 0;justify-content:center;}
.loader span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:ldot 1.2s infinite ease-in-out;}
.loader span:nth-child(2){animation-delay:.2s;background:var(--blue);}
.loader span:nth-child(3){animation-delay:.4s;background:var(--green);}
@keyframes ldot{0%,80%,100%{transform:scale(0.5);opacity:0.3}40%{transform:scale(1.1);opacity:1}}
.empty{color:var(--text3);font-size:0.82rem;text-align:center;padding:20px 0;}
.fade{animation:fi 0.35s ease forwards;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">

<!-- TICKER -->
<div class="ticker">
  <div class="tlabel">⚡ LIVE</div>
  <button class="tcatbtn on" data-cat="uae" onclick="switchTicker(this)">🇦🇪 UAE</button>
  <button class="tcatbtn" data-cat="india" onclick="switchTicker(this)">🇮🇳 India</button>
  <button class="tcatbtn" data-cat="world" onclick="switchTicker(this)">🌍 World</button>
  <button class="tcatbtn" data-cat="biz" onclick="switchTicker(this)">📈 Biz</button>
  <button class="tcatbtn" data-cat="tech" onclick="switchTicker(this)">⚡ Tech</button>
  <div class="ttrack"><div class="tinner" id="tickerEl"><span class="titem">Loading headlines…</span></div></div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="greeting" id="greetEl">Good <em>Morning</em></div>
    <div class="daterow">
      <span class="dstr" id="dateEl"></span>
      <span class="hdiv"></span>
      <span class="clk" id="clockEl"></span>
    </div>
  </div>
  <a class="open-outlook-btn" href="https://outlook.office.com/calendar/view/day" target="_blank">
    <svg width="16" height="16" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
    Open Outlook Calendar
  </a>
</div>

<!-- GRID -->
<div class="grid">

  <!-- WEATHER -->
  <div class="card" style="grid-column:1;grid-row:1;">
    <div class="shine"></div>
    <div class="clabel"><span class="dot" style="background:var(--gold)"></span>Weather · Dubai</div>
    <div id="weatherEl"><div class="loader"><span></span><span></span><span></span></div></div>
  </div>

  <!-- CALENDAR — embedded Outlook -->
  <div class="card cal-card" style="padding:16px;">
    <div class="shine"></div>
    <div class="clabelrow" style="margin-bottom:10px;">
      <div class="clabel" style="margin-bottom:0"><span class="dot" style="background:var(--blue)"></span>Today's Calendar</div>
      <a class="rbtn" href="https://outlook.office.com/calendar/view/day" target="_blank" style="text-decoration:none;">↗ Full view</a>
    </div>
    <div class="cal-frame-wrap">
      <iframe
        id="calFrame"
        src="https://outlook.office.com/calendar/view/day"
        title="Outlook Calendar"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation"
      ></iframe>
      <a class="cal-overlay-btn" href="https://outlook.office.com/calendar/view/day" target="_blank">↗ Open in Outlook</a>
    </div>
    <p style="font-size:0.68rem;color:var(--text3);margin-top:8px;text-align:center;">
      💡 If calendar shows a login screen, click "Open in Outlook" above — once you're signed in there, reload this page.
    </p>
  </div>

  <!-- TASKS -->
  <div class="card tasks-card">
    <div class="shine"></div>
    <div class="clabel"><span class="dot" style="background:var(--green)"></span>My Tasks</div>
    <div class="task-input-row">
      <input class="task-input" id="taskInput" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()">
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>
    <div class="task-list" id="taskList"></div>
  </div>

  <!-- NEWS -->
  <div class="card news-card">
    <div class="shine"></div>
    <div class="clabelrow">
      <div class="clabel" style="margin-bottom:0"><span class="dot" style="background:var(--red)"></span>News</div>
      <button class="rbtn" onclick="loadNews()">↻</button>
    </div>
    <div class="ntabs">
      <button class="ntab on" data-cat="uae" onclick="switchNews(this)">🇦🇪 UAE</button>
      <button class="ntab" data-cat="india" onclick="switchNews(this)">🇮🇳 India</button>
      <button class="ntab" data-cat="world" onclick="switchNews(this)">🌍 World</button>
      <button class="ntab" data-cat="biz" onclick="switchNews(this)">📈 Biz</button>
      <button class="ntab" data-cat="tech" onclick="switchNews(this)">⚡ Tech</button>
    </div>
    <div class="nscroll" id="newsEl"><div class="loader"><span></span><span></span><span></span></div></div>
  </div>

  <!-- AI -->
  <div class="card ai-card">
    <div class="shine"></div>
    <div class="clabelrow">
      <div class="clabel" style="margin-bottom:0"><span class="dot" style="background:var(--purple)"></span>AI Briefing</div>
      <button class="rbtn" onclick="loadAI()">↻</button>
    </div>
    <div id="aiEl"><div class="loader"><span></span><span></span><span></span></div></div>
  </div>

</div>
</div>

<script>
// ═══════════════════════════════════════
//  CONFIG — only Anthropic key needed now
// ═══════════════════════════════════════
const ANTHROPIC_API_KEY = "YOUR_ANTHROPIC_API_KEY_HERE";
// ═══════════════════════════════════════

// ── CLOCK ──
function tick(){
  const n=new Date(), h=n.getHours();
  document.getElementById('clockEl').textContent=n.toLocaleTimeString('en-AE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('dateEl').textContent=n.toLocaleDateString('en-AE',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
  const[p,e]=h<5?['Night','🌙']:h<12?['Morning','🌅']:h<17?['Afternoon','☀️']:h<21?['Evening','🌆']:['Night','🌙'];
  document.getElementById('greetEl').innerHTML=`Good <em>${p}</em> ${e}`;
}
setInterval(tick,1000); tick();

// ── WEATHER ──
async function loadWeather(){
  const el=document.getElementById('weatherEl');
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=25.2048&longitude=55.2708&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index&wind_speed_unit=kmh&timezone=Asia/Dubai');
    const d=await r.json(), c=d.current;
    const icons={0:'☀️',1:'⛅',2:'⛅',3:'☁️'};
    const ic=c.weather_code<=3?icons[c.weather_code]:c.weather_code<=49?'🌫️':c.weather_code<=59?'🌦️':c.weather_code<=69?'🌧️':c.weather_code<=79?'❄️':c.weather_code<=82?'🌧️':'⛈️';
    const ds=['Clear Sky','Mostly Clear','Partly Cloudy','Overcast'];
    const dc=c.weather_code<=3?ds[c.weather_code]:c.weather_code<=49?'Foggy':c.weather_code<=59?'Drizzle':c.weather_code<=69?'Rain':c.weather_code<=79?'Snowfall':c.weather_code<=82?'Heavy Rain':'Thunderstorm';
    const uvl=c.uv_index<=2?'Low':c.uv_index<=5?'Moderate':c.uv_index<=7?'High':c.uv_index<=10?'Very High':'Extreme';
    const uvp=Math.min((c.uv_index/12)*100,100);
    el.innerHTML=`
      <div class="w-hero">
        <div class="w-icon">${ic}</div>
        <div><div class="w-temp">${Math.round(c.temperature_2m)}<sup>°C</sup></div>
        <div class="w-city">DUBAI, UAE</div><div class="w-desc">${dc}</div></div>
      </div>
      <div class="w-grid">
        <div class="w-stat"><div class="w-val">${Math.round(c.apparent_temperature)}°C</div><div class="w-key">Feels Like</div></div>
        <div class="w-stat"><div class="w-val">${c.relative_humidity_2m}%</div><div class="w-key">Humidity</div></div>
        <div class="w-stat"><div class="w-val">${c.wind_speed_10m} km/h</div><div class="w-key">Wind</div></div>
        <div class="w-stat"><div class="w-val">UV ${c.uv_index}</div><div class="w-key">${uvl}</div></div>
      </div>
      <div class="uv-wrap">
        <div class="uv-top"><span>UV Index</span><span>${uvl}</span></div>
        <div class="uv-bar"><div class="uv-pin" style="left:${uvp}%"></div></div>
      </div>`;
  }catch{el.innerHTML=`<div class="empty">Weather unavailable</div>`;}
}

// ── TASKS (localStorage) ──
let tasks = JSON.parse(localStorage.getItem('dash_tasks')||'[]');

function saveTasks(){ localStorage.setItem('dash_tasks', JSON.stringify(tasks)); }

function renderTasks(){
  const el=document.getElementById('taskList');
  if(!tasks.length){el.innerHTML=`<div class="empty-tasks">No tasks yet — add one above!</div>`;return;}
  el.innerHTML=tasks.map((t,i)=>`
    <div class="titem-row fade">
      <div class="tcb${t.done?' done':''}" onclick="toggleTask(${i})"></div>
      <div class="ttitle${t.done?' strike':''}">${t.text}</div>
      <button class="tdel" onclick="deleteTask(${i})">×</button>
    </div>`).join('');
}

function addTask(){
  const inp=document.getElementById('taskInput');
  const txt=inp.value.trim();
  if(!txt) return;
  tasks.unshift({text:txt,done:false,id:Date.now()});
  saveTasks(); renderTasks(); inp.value='';
}

function toggleTask(i){ tasks[i].done=!tasks[i].done; saveTasks(); renderTasks(); }
function deleteTask(i){ tasks.splice(i,1); saveTasks(); renderTasks(); }

// ── NEWS ──
const FEEDS={
  uae:  'https://news.google.com/rss/search?q=UAE+Dubai&hl=en-AE&gl=AE&ceid=AE:en',
  india:'https://news.google.com/rss/search?q=India+news&hl=en-IN&gl=IN&ceid=IN:en',
  world:'https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en',
  biz:  'https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx6TVdZU0FtVnVHZ0pWVXlnQVAB',
  tech: 'https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGRqTVhZU0FtVnVHZ0pWVXlnQVAB'
};
let allNews={uae:[],india:[],world:[],biz:[],tech:[]}, curNews='uae', curTicker='uae';

async function fetchFeed(url){
  try{
    const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=10`,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(d.status==='ok'&&d.items?.length) return d.items.map(i=>({title:i.title.replace(/ - [\w\s]+$/,'').trim(),link:i.link,source:i.author||'',date:i.pubDate}));
  }catch{}
  try{
    const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(9000)});
    const txt=await r.text();
    const xml=new DOMParser().parseFromString(txt,'text/xml');
    return [...xml.querySelectorAll('item')].slice(0,10).map(i=>({
      title:i.querySelector('title')?.textContent?.replace(/<!\[CDATA\[|\]\]>/g,'').replace(/ - [\w\s]+$/,'').trim()||'',
      link:i.querySelector('link')?.textContent?.trim()||'',
      source:i.querySelector('source')?.textContent?.trim()||'',
      date:i.querySelector('pubDate')?.textContent?.trim()||''
    })).filter(i=>i.title&&i.title.length>5);
  }catch{}
  return[];
}

async function loadNews(){
  document.getElementById('newsEl').innerHTML=`<div class="loader"><span></span><span></span><span></span></div>`;
  await Promise.all(Object.entries(FEEDS).map(async([cat,url])=>{ allNews[cat]=await fetchFeed(url); }));
  renderNews(curNews);
  renderTicker(curTicker);
}

function renderNews(cat){
  const el=document.getElementById('newsEl'), items=allNews[cat]||[];
  if(!items.length){el.innerHTML=`<div class="empty">No headlines — try refreshing</div>`;return;}
  el.innerHTML=items.slice(0,10).map(i=>{
    const ds=i.date?new Date(i.date).toLocaleString('en-AE',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    return`<div class="nitem fade" onclick="window.open('${i.link}','_blank')">
      <div class="nhead">${i.title}</div>
      <div class="nmeta">${i.source?`<span class="nsrc">${i.source}</span>`:''}${ds?`<span>${ds}</span>`:''}</div>
    </div>`;
  }).join('');
}

function switchNews(btn){
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on'); curNews=btn.dataset.cat; renderNews(curNews);
}

function renderTicker(cat){
  const items=allNews[cat]||[]; if(!items.length) return;
  const d=[...items,...items];
  document.getElementById('tickerEl').innerHTML=d.map(i=>`<span class="titem" onclick="window.open('${i.link}','_blank')">${i.title}</span>`).join('');
}

function switchTicker(btn){
  document.querySelectorAll('.tcatbtn').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on'); curTicker=btn.dataset.cat;
  if(allNews[curTicker]?.length) renderTicker(curTicker);
}
